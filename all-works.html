    function openLightbox(element, type, project) {
        const lightbox = getOrCreateLightbox();
        
        if (type === 'video') {
            const videoSrc = element.getAttribute('data-video-src');
            const container = lightbox.querySelector('.lightbox-content');
            container.innerHTML = `
                <div class="lightbox-video-container">
                    <video controls autoplay>
                        <source src="${videoSrc}" type="video/mp4">
                        Ваш браузер не поддерживает видео.
                    </video>
                </div>
            `;
            lightbox.dataset.type = 'video';
            hideArrows();
        } else {
            currentGalleryImages = projectImages[project];
            const images = Array.from(element.parentElement.querySelectorAll('.gallery-img, .gallery-video'));
            currentIndex = images.indexOf(element);
            
            const container = lightbox.querySelector('.lightbox-content');
            container.innerHTML = `<img src="${currentGalleryImages[currentIndex].src}" alt="${currentGalleryImages[currentIndex].alt}">`;
            
            lightbox.dataset.type = 'image';
            showArrows();
            updateArrows();
        }
        
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function getOrCreateLightbox() {
        let lightbox = document.querySelector('.lightbox');
        if (!lightbox) {
            lightbox = document.createElement('div');
            lightbox.className = 'lightbox';
            lightbox.innerHTML = `
                <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
                <span class="lightbox-prev" onclick="changeMedia(-1)">&#10094;</span>
                <div class="lightbox-content"></div>
                <span class="lightbox-next" onclick="changeMedia(1)">&#10095;</span>
            `;
            document.body.appendChild(lightbox);
        }
        return lightbox;
    }

    function closeLightbox() {
        const lightbox = document.querySelector('.lightbox');
        if (lightbox) {
            const video = lightbox.querySelector('video');
            if (video) {
                video.pause();
                video.src = '';
            }
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }
    }

    function changeMedia(direction) {
        const lightbox = document.querySelector('.lightbox');
        if (lightbox.dataset.type !== 'image') return;
        
        currentIndex += direction;
        if (currentIndex < 0) currentIndex = currentGalleryImages.length - 1;
        if (currentIndex >= currentGalleryImages.length) currentIndex = 0;
        
        const container = lightbox.querySelector('.lightbox-content');
        container.innerHTML = `<img src="${currentGalleryImages[currentIndex].src}" alt="${currentGalleryImages[currentIndex].alt}">`;
        
        updateArrows();
    }

    function updateArrows() {
        const lightbox = document.querySelector('.lightbox');
        if (!lightbox) return;
        
        if (currentGalleryImages.length <= 1) {
            hideArrows();
        } else {
            showArrows();
        }
    }

    function showArrows() {
        const lightbox = document.querySelector('.lightbox');
        if (lightbox) {
            lightbox.querySelector('.lightbox-prev').style.display = 'block';
            lightbox.querySelector('.lightbox-next').style.display = 'block';
        }
    }

    function hideArrows() {
        const lightbox = document.querySelector('.lightbox');
        if (lightbox) {
            lightbox.querySelector('.lightbox-prev').style.display = 'none';
            lightbox.querySelector('.lightbox-next').style.display = 'none';
        }
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') changeMedia(-1);
        if (e.key === 'ArrowRight') changeMedia(1);
    });

    document.addEventListener('click', function(e) {
        const lightbox = document.querySelector('.lightbox');
        if (e.target === lightbox) {
            closeLightbox();
        }
    });
